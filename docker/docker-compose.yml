services:
  # ── Next.js App ──────────────────────────────────────────────────────────────
  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: digital-me
    image: debugger612/digital-me:latest
    ports:
      - "7001:7001"
    env_file:
      - ./.env.docker
    volumes:
      - ../data:/app/data
      - ../memory:/app/memory
      - ../.logs:/app/.logs
    restart: unless-stopped

  # ── Scheduler (optional — start with: docker compose --profile scheduler up) ─
  scheduler:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: digital-me-scheduler
    profiles:
      - scheduler
    env_file:
      - ./.env.docker
    volumes:
      - ../data:/app/data
      - ../memory:/app/memory
      - ../.logs:/app/.logs
    restart: unless-stopped
    command: ["npx", "ts-node", "-r", "tsconfig-paths/register", "--project", "tsconfig.cli.json", "jobs/scheduler.ts"]
